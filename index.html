<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MAHAM TRADES - PREMIUM ENGINE</title>
    <style>
        :root {
            --bg-dark: #06080c;
            --card-bg: #0d1116;
            --input-bg: #151a22;
            --neon-green: #00ffaa;
            --neon-cyan: #00f0ff;
            --neon-pink: #ff0055;
            --neon-purple: #bd00ff;
            --text-gray: #7d8590;
            --terminal-bg: #05070a;
            --gold: #ffb700;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, Roboto, sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 15px;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(rgba(0, 240, 255, 0.015) 1px, transparent 1px),
                        linear-gradient(90deg, rgba(0, 240, 255, 0.015) 1px, transparent 1px);
            background-size: 25px 25px;
            z-index: -1;
        }

        .container {
            width: 100%;
            max-width: 450px;
            background: var(--card-bg);
            border: 1px solid #21262d;
            border-radius: 24px;
            padding: 24px;
            box-shadow: 0 15px 50px rgba(0, 0, 0, 0.8);
        }

        .header {
            text-align: center;
            margin-bottom: 25px;
        }

        .chip-icon {
            width: 65px;
            height: 65px;
            background: #090d14;
            border: 2px solid var(--neon-cyan);
            border-radius: 16px;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0 auto 12px;
            box-shadow: 0 0 20px rgba(0, 240, 255, 0.25);
            position: relative;
        }

        .chip-icon svg {
            width: 32px;
            height: 32px;
            fill: var(--neon-cyan);
        }

        .version-tag {
            position: absolute;
            bottom: -8px;
            background: #000;
            color: var(--neon-cyan);
            border: 1px solid var(--neon-cyan);
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 10px;
            font-weight: bold;
            font-family: monospace;
        }

        .header h1 {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 0.5px;
            color: #ffffff;
        }

        .header h1 span {
            color: var(--neon-cyan);
            text-shadow: 0 0 15px rgba(0, 240, 255, 0.4);
        }

        .header p {
            color: var(--text-gray);
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            margin-top: 6px;
            font-weight: 600;
        }

        .form-group {
            margin-bottom: 18px;
        }

        .label-title {
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--neon-cyan);
            margin-bottom: 8px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .label-title.purple { color: var(--neon-purple); }
        .label-title.pink { color: var(--neon-pink); }
        .label-title.green { color: var(--neon-green); }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper svg {
            position: absolute;
            left: 12px;
            width: 16px;
            height: 16px;
            fill: var(--text-gray);
        }

        select, input[type="number"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid #2d333b;
            border-radius: 12px;
            color: #ffffff;
            padding: 14px 14px 14px 38px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            transition: all 0.25s ease;
            appearance: none;
        }

        select:focus, input[type="number"]:focus {
            border-color: var(--neon-cyan);
            box-shadow: 0 0 12px rgba(0, 240, 255, 0.15);
        }

        .row-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .action-grid {
            display: grid;
            grid-template-columns: 0.8fr 1.2fr;
            gap: 12px;
            margin-top: 24px;
        }

        .btn {
            border-radius: 12px;
            padding: 14px;
            font-size: 14px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-reset {
            background: rgba(255, 0, 85, 0.05);
            border: 1px solid rgba(255, 0, 85, 0.2);
            color: var(--neon-pink);
        }

        .btn-reset:hover {
            background: rgba(255, 0, 85, 0.1);
        }

        .btn-submit {
            background: var(--neon-cyan);
            border: none;
            color: #000000;
            box-shadow: 0 4px 20px rgba(0, 240, 255, 0.3);
        }

        .btn-submit:hover {
            background: #00d2ff;
            transform: translateY(-1px);
        }

        .btn-copy {
            background: var(--neon-green);
            border: none;
            color: #000000;
            margin: 15px auto 0;
            width: 100%;
            box-shadow: 0 4px 15px rgba(0, 255, 170, 0.2);
        }

        .btn-copy:hover {
            background: #00e699;
        }

        .loader-panel {
            display: none;
            background: var(--input-bg);
            border: 1px dashed var(--neon-cyan);
            border-radius: 14px;
            padding: 16px;
            text-align: center;
            margin-top: 20px;
        }

        .pulse-loader {
            width: 26px;
            height: 26px;
            border: 2px solid rgba(0, 240, 255, 0.1);
            border-radius: 50%;
            border-top-color: var(--neon-cyan);
            margin: 0 auto 10px;
            animation: rotate 0.7s linear infinite;
        }

        @keyframes rotate { 100% { transform: rotate(360deg); } }

        .loader-text {
            font-size: 12px;
            font-family: monospace;
            color: var(--neon-cyan);
        }

        .terminal-board {
            display: none;
            background: var(--terminal-bg);
            border: 1px solid #2d333b;
            border-radius: 14px;
            margin-top: 24px;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.6);
        }

        .terminal-header {
            background: #12161f;
            padding: 10px 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid #21262d;
        }

        .mac-dots {
            display: flex;
            gap: 6px;
        }

        .dot { width: 10px; height: 10px; border-radius: 50%; }
        .dot.r { background: #ff5f56; }
        .dot.y { background: #ffbd2e; }
        .dot.g { background: #27c93f; }

        .terminal-title {
            font-family: monospace;
            font-size: 11px;
            color: var(--text-gray);
        }

        .terminal-body {
            padding: 16px;
            font-family: 'Courier New', Courier, monospace;
            font-size: 13px;
            line-height: 1.6;
            color: #e6edf3;
            white-space: pre-wrap;
            max-height: 400px;
            overflow-y: auto;
        }

        .t-green { color: var(--neon-green); }
        .t-cyan { color: var(--neon-cyan); }
        .t-pink { color: var(--neon-pink); }
        .t-gold { color: var(--gold); }

        .toast-notification {
            position: fixed;
            bottom: -80px;
            left: 50%;
            transform: translateX(-50%);
            background: #090d14;
            border: 2px solid var(--neon-green);
            color: #ffffff;
            padding: 14px 24px;
            border-radius: 50px;
            font-size: 13px;
            font-weight: bold;
            letter-spacing: 0.5px;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 0 10px 30px rgba(0, 255, 170, 0.3);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            z-index: 9999;
            opacity: 0;
            pointer-events: none;
            width: max-content;
        }

        .toast-notification.show {
            bottom: 30px;
            opacity: 1;
        }

        .toast-icon {
            background: rgba(0, 255, 170, 0.1);
            border-radius: 50%;
            width: 22px;
            height: 22px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--neon-green);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <div class="chip-icon">
            <svg viewBox="0 0 24 24">
                <path d="M19,11H17V9A1,1,0,0,0,16,8H14V6a1,1,0,0,0-1-1H11V3a1,1,0,0,0-2,0V5H7A1,1,0,0,0,6,6H4V8A1,1,0,0,0,3,9v2H1a1,1,0,0,0,0,2H3v2a1,1,0,0,0,1,1H6v2a1,1,0,0,0,1,1H9v2a1,1,0,0,0,2,0V19h2a1,1,0,0,0,1-1V16h2a1,1,0,0,0,1-1V13h2a1,1,0,0,0,0-2V11ZM15,15H9V9h6Z"/>
            </svg>
            <div class="version-tag">v6.1</div>
        </div>
        <h1>MAHAM <span>TRADES</span></h1>
        <p>ADVANCED MARKET AI ENGINE</p>
    </div>

    <div class="form-group">
        <div class="label-title"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-1 17.93c-3.95-.49-7-3.85-7-7.93 0-.62.08-1.21.21-1.79L9 15v1c0 1.1.9 2 2 2v1.93zm6.9-2.54c-.26-.81-1-1.39-1.9-1.39h-1v-3c0-.55-.45-1-1-1H8v-2h2c.55 0 1-.45 1-1V7h2c1.1 0 2-.9 2-2v-.41c2.93 1.19 5 4.06 5 7.41 0 2.08-.8 3.97-2.1 5.39z"/></svg> CURRENCY PAIR</div>
        <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-3.5 9c-.83 0-1.5-.67-1.5-1.5S14.67 9 15.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/></svg>
            <select id="assetDropdown">
                <option value="LIVE-MIXED">ALL LIVE MARKET PAIRS (USDJPY, GBPUSD, EURJPY, EURUSD)</option>
                <option value="USD/JPY">USD/JPY (LIVE)</option>
                <option value="GBP/USD">GBP/USD (LIVE)</option>
                <option value="EUR/JPY">EUR/JPY (LIVE)</option>
                <option value="EUR/USD">EUR/USD (LIVE)</option>
            </select>
        </div>
    </div>

    <div class="form-group">
        <div class="label-title green"><svg width="12" height="12" viewBox="0 0 24 24" fill="currentColor"><path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg> TIME FRAME</div>
        <div class="input-wrapper">
            <svg viewBox="0 0 24 24"><path d="M11 15h2v2h-2zm0-8h2v6h-2zm.99-5C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8z"/></svg>
            <select disabled>
                <option>1 MINUTE (ANALYSIS MODE)</option>
            </select>
        </div>
    </div>

    <div class="row-grid">
        <div class="form-group">
            <div class="label-title purple"># SIGNALS</div>
            <div class="input-wrapper">
                <svg viewBox="0 0 24 24"><path d="M10 20h4V4h-4v16zm-6 0h4v-8H4v18zM16 9v11h4V9h-4z"/></svg>
                <input type="number" id="sigCount" min="1" max="50" value="10">
            </div>
        </div>
        <div class="form-group">
            <div class="label-title pink">DIRECTION</div>
            <div class="input-wrapper">
                <svg viewBox="0 0 24 24"><path d="M16 6l2.29 2.29-4.88 4.88-4-4L2 16.59 3.41 18l6-6 4 4 6.3-6.29L22 12V6z"/></svg>
                <select id="dirSelect">
                    <option value="ALL">ALL</option>
                    <option value="BUY">ONLY BUY</option>
                    <option value="PUT">ONLY PUT</option>
                </select>
            </div>
        </div>
    </div>

    <div class="loader-panel" id="loadingPanel">
        <div class="pulse-loader"></div>
        <div class="loader-text" id="loaderLog">Initializing AI Core Node...</div>
    </div>

    <div class="action-grid">
        <button class="btn btn-reset" onclick="resetForm()">Reset</button>
        <button class="btn btn-submit" onclick="executeForenixEngine()">Get Signals</button>
    </div>

    <div class="terminal-board" id="resultTerminal">
        <div class="terminal-header">
            <div class="mac-dots">
                <div class="dot r"></div>
                <div class="dot y"></div>
                <div class="dot g"></div>
            </div>
            <div class="terminal-title">>_ ANALYSISRESULT.JSON</div>
        </div>
        <div class="terminal-body" id="terminalContent"></div>
        <button class="btn btn-copy" onclick="copySignalsToClipboard()">📋 Copy Signals Text</button>
    </div>
</div>

<div class="toast-notification" id="customToast">
    <div class="toast-icon">✓</div>
    <span>YOUR SIGNALS COPY SUCCESS! 🚀</span>
</div>

<script>
    let rawTextForCopy = "";

    function resetForm() {
        document.getElementById('sigCount').value = 10;
        document.getElementById('resultTerminal').style.display = 'none';
        document.getElementById('loadingPanel').style.display = 'none';
    }

    function executeForenixEngine() {
        const count = parseInt(document.getElementById('sigCount').value);
        if (isNaN(count) || count < 1) {
            alert("Ali bhai, proper signal value set karein!");
            return;
        }

        const loader = document.getElementById('loadingPanel');
        const terminal = document.getElementById('resultTerminal');
        
        terminal.style.display = 'none';
        loader.style.display = 'block';

        const stages = [
            "📈 [1/5] FETCHING MULTI-TIMEFRAME CANDLESTICK TRENDS...",
            "🔍 [2/5] PARSING HISTORICAL SUPPORT & RESISTANCE (S&R) KEY LEVELS...",
            "📊 [3/5] SCANNING MOVING AVERAGES & STOCHASTIC OSCILLATORS...",
            "⚠️ [4/5] VOLATILITY CHECK: FILTERING S-LEVEL BOUNCES & ELIMINATING GAPS...",
            "🚀 [5/5] ALGORITHMS MATCHED! 100% PREMIUM VERIFIED OUTPUT GENERATED..."
        ];

        let index = 0;
        const scan = setInterval(() => {
            if (index < stages.length) {
                document.getElementById('loaderLog').innerText = stages[index];
                index++;
            } else {
                clearInterval(scan);
                loader.style.display = 'none';
                renderPremiumTerminal(count);
            }
        }, 800); 
    }

    function renderPremiumTerminal(total) {
        const terminalContent = document.getElementById('terminalContent');
        const selectedOption = document.getElementById('assetDropdown').value;
        const preferredDir = document.getElementById('dirSelect').value;

        const now = new Date();
        const d = String(now.getDate()).padStart(2, '0');
        const m = String(now.getMonth() + 1).padStart(2, '0');
        const y = now.getFullYear();
        const formattedDate = `${d}/${m}/${y}`;

        let outputHTML = `✨ <span class="t-gold">MAHAM TRADES FUTURE SIGNALS</span> ✨\n\n`;
        outputHTML += `🖥 <span class="t-cyan">DATE: ${formattedDate}</span>\n`;
        outputHTML += `⌛ <span class="t-cyan">PAKISTANI TIME (AM/PM) 🇵🇰</span>\n`;
        outputHTML += `🎯 <span class="t-green">SIGNAL ACCURACY: 100% PREMIUM VERIFIED</span>\n\n`;
        outputHTML += `❗️ <span class="t-pink">AVOID SIGNAL AFTER BIG MOMENTUM, DOJI, BELOW 80%, GAPS 😊</span>\n\n`;
        outputHTML += `⚡ <span class="t-gold">MARTINGALE: -01</span>\n\n`;
        outputHTML += `<span class="t-cyan">1 MINUTES MODE :-</span>\n\n`;

        rawTextForCopy = `✨ MAHAM TRADES FUTURE SIGNALS ✨\n\n`;
        rawTextForCopy += `🖥 DATE: ${formattedDate}\n`;
        rawTextForCopy += `⌛ PAKISTANI TIME (AM/PM) 🇵🇰\n`;
        rawTextForCopy += `🎯 SIGNAL ACCURACY: 100% PREMIUM VERIFIED\n\n`;
        rawTextForCopy += `❗️ AVOID SIGNAL AFTER BIG MOMENTUM, DOJI, BELOW 80%, GAPS 😊\n\n`;
        rawTextForCopy += `⚡ MARTINGALE: -01\n\n`;
        rawTextForCopy += `1 MINUTES MODE :-\n\n`;

        // Start time calculation with minor 3-minute initial offset buffer
        let currentMinutes = now.getMinutes() + 3;
        let currentHours = now.getHours();

        const livePairs = ["USD/JPY", "GBP/USD", "EUR/JPY", "EUR/USD"];
        const modes = ["M-Pattern Breakout", "W-Pattern Reversal", "S-Level Bounce", "SMA Trend Ride"];

        for (let i = 0; i < total; i++) {
            if (currentMinutes >= 60) {
                currentHours += Math.floor(currentMinutes / 60);
                currentMinutes = currentMinutes % 60;
                currentHours = currentHours % 24;
            }

            let currentAsset = selectedOption;
            if (selectedOption === "LIVE-MIXED") {
                currentAsset = livePairs[i % livePairs.length];
            }

            let finalDir = "BUY";
            if (preferredDir === "ALL") {
                finalDir = Math.random() > 0.5 ? "BUY" : "PUT";
            } else {
                finalDir = preferredDir;
            }

            let displayHours = currentHours;
            let ampm = displayHours >= 12 ? 'PM' : 'AM';
            displayHours = displayHours % 12;
            displayHours = displayHours ? displayHours : 12;

            const timeStr = `${String(displayHours).padStart(2, '0')}:${String(currentMinutes).padStart(2, '0')} ${ampm}`;
            const dirColor = finalDir === "BUY" ? "t-green" : "t-pink";
            const randomMode = modes[Math.floor(Math.random() * modes.length)];

            // UI displays mode safely
            outputHTML += `• <span class="t-gold">${timeStr}</span> → <span class="t-cyan">${currentAsset}</span> | <span class="${dirColor}">${finalDir}</span> | Mode: ${randomMode}\n`;
            
            // Clean clipboard alignment without modes text
            rawTextForCopy += `• ${timeStr} → ${currentAsset} | ${finalDir}\n`;

            // STRICT FIX: Updates gap between 3 to 5 minutes perfectly
            currentMinutes += Math.floor(Math.random() * 3) + 3; 
        }

        const rulesBlock = `\n🎯 TRADING RULES (Avoid)\n✗ Doji Candle\n✗ Big Gap\n✗ B2B Trade on same Market\n✗ Opposite Trend / Against Trend`;
        
        outputHTML += `\n🎯 <span class="t-gold">TRADING RULES (Avoid)</span>\n`;
        outputHTML += `<span class="t-pink">✗ Doji Candle\n✗ Big Gap\n✗ B2B Trade on same Market\n✗ Opposite Trend / Against Trend</span>`;
        
        rawTextForCopy += rulesBlock;

        terminalContent.innerHTML = outputHTML;
        document.getElementById('resultTerminal').style.display = 'block';
    }

    function copySignalsToClipboard() {
        if (!rawTextForCopy) return;
        navigator.clipboard.writeText(rawTextForCopy).then(() => {
            const toast = document.getElementById('customToast');
            toast.classList.add('show');
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }).catch(err => {
            console.error("Error copying text: " + err);
        });
    }
</script>

</body>
</html>
